# ── SAFE Browser Worker ──────────────────────────────────────────
# Runs KasmVNC Chromium inside a CF Container, proxied via Worker.
# Each Container instance = one isolated browser session.
#
# Architecture:
#   Client ──HTTP/WS──▶ Worker ──▶ Container DO ──▶ KasmVNC (port 6901)

name = "safe-browser"
main = "src/index.js"
compatibility_date = "2025-09-17"
compatibility_flags = ["nodejs_compat"]

[vars]
# Comma-separated origins allowed for CORS / WebSocket upgrade
CORS_ORIGINS = "https://message.sentry.red"

# ── Container configuration ──────────────────────────────────────
# Each BrowserSession DO manages one KasmVNC Chromium container instance.
[[containers]]
class_name = "BrowserSession"
image = "./Dockerfile"
max_instances = 10

# Durable Object binding — Container class extends DurableObject
[[durable_objects.bindings]]
name = "BROWSER_SESSION"
class_name = "BrowserSession"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BrowserSession"]

# ── UAT Environment ──────────────────────────────────────────────
[env.uat]
name = "safe-browser-uat"

[env.uat.vars]
CORS_ORIGINS = "https://uat-message.sentry.red"

[[env.uat.containers]]
class_name = "BrowserSession"
image = "./Dockerfile"
max_instances = 5

[[env.uat.durable_objects.bindings]]
name = "BROWSER_SESSION"
class_name = "BrowserSession"
