<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <title>SENTRY MESSENGER — Push Notifications</title>
    <link rel="icon" href="/assets/favicon.ico" type="image/x-icon" />
    <link rel="manifest" href="/manifest.json" />
    <script>
      // Inline i18n bootstrap (same as login.html)
      (function(){
        var lang = 'en';
        try { lang = navigator.language || 'en'; } catch {}
        var tag = lang.toLowerCase();
        if (tag==='zh-hant'||tag==='zh-tw'||tag==='zh-hk'||tag.indexOf('zh-hant')===0) tag='zh-Hant';
        else if (tag==='zh-hans'||tag==='zh-cn'||tag==='zh-sg'||tag.indexOf('zh-hans')===0||tag==='zh') tag='zh-Hans';
        else tag = tag.split('-')[0];
        var supported = {en:1,'zh-Hant':1,'zh-Hans':1,ja:1,ko:1,th:1,vi:1};
        if (!supported[tag]) tag = 'en';
        var msgs = {}, fb = {};
        function loadSync(url) {
          try { var x = new XMLHttpRequest(); x.open('GET', url, false); x.send(); return x.status===200 ? JSON.parse(x.responseText) : {}; } catch { return {}; }
        }
        fb = loadSync('/locales/en.json');
        if (tag !== 'en') msgs = loadSync('/locales/' + tag + '.json');
        function resolve(o, p) { return p.split('.').reduce(function(a,k){ return a&&a[k]; }, o); }
        window.__t = function(key, params) {
          var val = resolve(msgs, key) || resolve(fb, key) || key;
          if (!params || typeof val !== 'string') return val;
          return val.replace(/\{(\w+)\}/g, function(_, k) { return params[k] != null ? params[k] : '{'+k+'}'; });
        };
        document.documentElement.lang = tag;
      })();
    </script>
    <style>
      :root { color-scheme: dark; --bg:#0f172a; --fg:#e2e8f0; --muted:#94a3b8; --line:rgba(148,163,184,0.18); --accent:#38bdf8; --danger:#ef4444; --card:rgba(15,23,42,0.65); --gradient:linear-gradient(160deg,#0f172a,#1e293b 65%,#020617); }
      * { box-sizing:border-box; margin:0; padding:0; }
      html, body { height:100%; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, 'Noto Sans TC', sans-serif;
        background:var(--gradient); background-color:var(--bg); background-attachment:fixed;
        color:var(--fg);
        display:flex; justify-content:center;
        padding:calc(24px + env(safe-area-inset-top,0px)) 16px calc(24px + env(safe-area-inset-bottom,0px));
        overscroll-behavior:contain;
        -webkit-text-size-adjust:100%;
      }
      .pwa-shell {
        width:min(480px,100%); max-height:100%; overflow-y:auto;
        -webkit-overflow-scrolling:touch;
      }

      /* Header */
      .pwa-header { text-align:center; padding:32px 0 24px; }
      .pwa-logo-wrap {
        position:relative; display:inline-flex; align-items:center; justify-content:center;
        width:72px; height:72px; margin-bottom:16px;
      }
      .pwa-logo-glow {
        position:absolute; inset:-8px; border-radius:50%;
        background:radial-gradient(circle, rgba(56,189,248,0.35) 0%, rgba(59,130,246,0.18) 50%, transparent 70%);
        animation:logo-breathe 3s ease-in-out infinite;
        pointer-events:none;
      }
      @keyframes logo-breathe {
        0%, 100% { transform:scale(0.85); opacity:0.5; }
        50% { transform:scale(1.2); opacity:1; }
      }
      .pwa-logo {
        position:relative; z-index:1; width:56px; height:56px;
        filter:brightness(0) saturate(100%) invert(62%) sepia(93%) saturate(1200%) hue-rotate(176deg) brightness(100%) contrast(96%);
      }
      .pwa-title { font-size:18px; font-weight:700; letter-spacing:1.5px; margin-bottom:4px; }
      .pwa-subtitle { font-size:13px; color:var(--muted); }

      /* Status card */
      .status-card {
        background:var(--card); border:1px solid var(--line); border-radius:14px;
        padding:20px; margin-bottom:16px; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
      }
      .status-row { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
      .status-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
      .status-dot.active { background:#22c55e; box-shadow:0 0 6px rgba(34,197,94,0.4); }
      .status-dot.inactive { background:var(--muted); }
      .status-label { font-size:15px; font-weight:600; }
      .status-detail { font-size:13px; color:var(--muted); line-height:1.5; }

      /* Buttons */
      .btn-row { display:flex; gap:10px; margin-top:16px; }
      .btn {
        flex:1; padding:12px 16px; border-radius:10px; border:none;
        font-size:14px; font-weight:600; cursor:pointer;
        display:inline-flex; align-items:center; justify-content:center; gap:6px;
        transition:opacity .15s;
      }
      .btn:disabled { opacity:0.5; cursor:not-allowed; }
      .btn-danger { background:var(--danger); color:#fff; }
      .btn-danger:hover:not(:disabled) { opacity:0.85; }
      .btn-secondary { background:rgba(148,163,184,0.15); color:var(--fg); }
      .btn-secondary:hover:not(:disabled) { background:rgba(148,163,184,0.25); }

      /* Info sections */
      .info-section {
        background:var(--card); border:1px solid var(--line); border-radius:14px;
        padding:18px; margin-bottom:14px; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
      }
      .info-title { font-size:14px; font-weight:700; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
      .info-body { font-size:13px; color:var(--muted); line-height:1.7; }
      .info-body strong { color:var(--fg); font-weight:600; }
      .info-body ul { padding-left:18px; margin:6px 0; }
      .info-body li { margin-bottom:4px; }
      .info-body .platform-label { color:var(--accent); font-weight:600; font-size:13px; margin-top:10px; display:block; }

      /* Footer */
      .pwa-footer { text-align:center; padding:20px 0; }
      .pwa-footer a { color:var(--accent); font-size:13px; text-decoration:none; }
      .pwa-footer a:hover { text-decoration:underline; }

      /* PIN digit boxes */
      .pin-boxes { display:flex; gap:8px; justify-content:center; margin-bottom:14px; }
      .pin-box {
        width:44px; height:54px; border:1.5px solid var(--line); border-radius:12px;
        background:rgba(15,23,42,0.5); color:var(--fg);
        font-size:24px; font-weight:700; font-family:monospace;
        text-align:center; line-height:54px;
        caret-color:var(--accent);
        outline:none; transition:border-color .15s, box-shadow .15s;
        -webkit-text-security:none;
      }
      .pin-box:focus {
        border-color:var(--accent);
        box-shadow:0 0 0 3px rgba(56,189,248,0.2);
      }
      .pin-box.filled {
        border-color:var(--accent);
        background:rgba(56,189,248,0.06);
      }

      /* Toast */
      .toast {
        position:fixed; bottom:env(safe-area-inset-bottom,20px); left:50%; transform:translateX(-50%);
        background:rgba(30,41,59,0.95); color:#fff; padding:10px 20px; border-radius:10px;
        font-size:13px; opacity:0; transition:opacity .25s; pointer-events:none; z-index:100;
        backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
      }
      .toast.show { opacity:1; }
    </style>
  </head>
  <body>
    <div class="pwa-shell">
      <div class="pwa-header">
        <div class="pwa-logo-wrap">
          <div class="pwa-logo-glow"></div>
          <img src="/assets/images/logo.svg" alt="SENTRY" class="pwa-logo" />
        </div>
        <div class="pwa-title">SENTRY MESSENGER</div>
        <div class="pwa-subtitle" data-i18n="push.pwaSubtitle"></div>
      </div>

      <!-- Push status card -->
      <div class="status-card">
        <div class="status-row">
          <span class="status-dot inactive" id="statusDot"></span>
          <span class="status-label" id="statusLabel"></span>
        </div>
        <div class="status-detail" id="statusDetail"></div>
        <div class="btn-row" id="actionRow" style="display:none">
          <button class="btn btn-danger" id="btnDisable" type="button"></button>
        </div>
      </div>

      <!-- PIN enrollment card (shown when no active subscription) -->
      <div class="status-card" id="pinCard" style="display:none">
        <div style="font-weight:600;font-size:15px;margin-bottom:8px;" data-i18n="push.pinEnrollTitle"></div>
        <div style="font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:14px;" data-i18n="push.pinEnrollDesc"></div>
        <div class="pin-boxes" id="pinBoxes">
          <input type="text" inputmode="numeric" maxlength="1" class="pin-box" data-idx="0" autocomplete="off" />
          <input type="text" inputmode="numeric" maxlength="1" class="pin-box" data-idx="1" autocomplete="off" />
          <input type="text" inputmode="numeric" maxlength="1" class="pin-box" data-idx="2" autocomplete="off" />
          <input type="text" inputmode="numeric" maxlength="1" class="pin-box" data-idx="3" autocomplete="off" />
          <input type="text" inputmode="numeric" maxlength="1" class="pin-box" data-idx="4" autocomplete="off" />
          <input type="text" inputmode="numeric" maxlength="1" class="pin-box" data-idx="5" autocomplete="off" />
        </div>
        <!-- Hidden field to gather the full PIN value -->
        <input type="hidden" id="pinInput" />
        <button class="btn" id="btnEnroll" type="button" style="width:100%;background:var(--accent);color:#000;" data-i18n="push.pinEnrollBtn"></button>
        <div id="pinError" style="font-size:12px;color:var(--danger);margin-top:8px;display:none;"></div>
      </div>

      <!-- Push limitations: Basic info -->
      <div class="info-section">
        <div class="info-title" data-i18n="push.infoBasicTitle"></div>
        <div class="info-body">
          <ul>
            <li data-i18n="push.infoBasic1"></li>
            <li data-i18n="push.infoBasic2"></li>
            <li data-i18n="push.infoBasic3"></li>
          </ul>
        </div>
      </div>

      <!-- Push limitations: iOS -->
      <div class="info-section">
        <div class="info-title">iOS (iPhone / iPad)</div>
        <div class="info-body">
          <ul>
            <li data-i18n="push.infoIOS1"></li>
            <li data-i18n="push.infoIOS2"></li>
            <li data-i18n="push.infoIOS3"></li>
            <li data-i18n="push.infoIOS4"></li>
          </ul>
        </div>
      </div>

      <!-- Push limitations: Android -->
      <div class="info-section">
        <div class="info-title">Android (Chrome)</div>
        <div class="info-body">
          <ul>
            <li data-i18n="push.infoAndroid1"></li>
            <li data-i18n="push.infoAndroid2"></li>
            <li data-i18n="push.infoAndroid3"></li>
          </ul>
        </div>
      </div>

      <!-- Push limitations: Desktop -->
      <div class="info-section">
        <div class="info-title" data-i18n="push.infoDesktopTitle"></div>
        <div class="info-body">
          <ul>
            <li data-i18n="push.infoDesktop1"></li>
            <li data-i18n="push.infoDesktop2"></li>
          </ul>
        </div>
      </div>

      <!-- Push limitations: Unsupported -->
      <div class="info-section">
        <div class="info-title" data-i18n="push.infoUnsupportedTitle"></div>
        <div class="info-body">
          <ul>
            <li data-i18n="push.infoUnsupported1"></li>
            <li data-i18n="push.infoUnsupported2"></li>
            <li data-i18n="push.infoUnsupported3"></li>
          </ul>
        </div>
      </div>

      <!-- Push limitations: Reliability -->
      <div class="info-section">
        <div class="info-title" data-i18n="push.infoReliabilityTitle"></div>
        <div class="info-body">
          <ul>
            <li data-i18n="push.infoReliability1"></li>
            <li data-i18n="push.infoReliability2"></li>
            <li data-i18n="push.infoReliability3"></li>
          </ul>
        </div>
      </div>

      <div class="pwa-footer">
        <a href="/pages/app.html" target="_blank" data-i18n="push.openInBrowser"></a>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      (function () {
        var t = window.__t;
        var VAPID_PUBLIC_KEY = 'BGNlllC_H-lqHnnKrxT2IhF_5_xei3is_loJHesBmzjhfgmGMwq_nwlVVaKkrOhTnCO9_DeFtlotIl3Oug3eI2k';

        var statusDot = document.getElementById('statusDot');
        var statusLabel = document.getElementById('statusLabel');
        var statusDetail = document.getElementById('statusDetail');
        var actionRow = document.getElementById('actionRow');
        var btnDisable = document.getElementById('btnDisable');
        var pinCard = document.getElementById('pinCard');
        var pinInput = document.getElementById('pinInput');
        var btnEnroll = document.getElementById('btnEnroll');
        var pinError = document.getElementById('pinError');
        var toastEl = document.getElementById('toast');

        // Apply i18n to data-i18n elements
        document.querySelectorAll('[data-i18n]').forEach(function (el) {
          var k = el.getAttribute('data-i18n');
          if (k) el.textContent = t(k);
        });

        btnDisable.textContent = t('push.disableBtn');

        function urlBase64ToUint8Array(base64String) {
          var padding = '='.repeat((4 - base64String.length % 4) % 4);
          var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
          var raw = atob(base64);
          var arr = new Uint8Array(raw.length);
          for (var i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
          return arr;
        }

        function showToast(msg) {
          toastEl.textContent = msg;
          toastEl.classList.add('show');
          setTimeout(function () { toastEl.classList.remove('show'); }, 2500);
        }

        function setStatus(active, label, detail) {
          statusDot.className = 'status-dot ' + (active ? 'active' : 'inactive');
          statusLabel.textContent = label;
          statusDetail.textContent = detail;
          actionRow.style.display = active ? 'flex' : 'none';
          // Show PIN card only when inactive and push is supported
          if (pinCard) pinCard.style.display = active ? 'none' : 'block';
        }

        // Check push subscription status
        async function checkStatus() {
          if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
            var isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            setStatus(false, t('push.statusUnsupported'), isIOS ? t('push.iosRequiresPWA') : t('push.statusUnsupportedDetail'));
            if (pinCard) pinCard.style.display = 'none';
            return;
          }

          if (Notification.permission === 'denied') {
            setStatus(false, t('push.statusDenied'), t('push.statusDeniedDetail'));
            if (pinCard) pinCard.style.display = 'none';
            return;
          }

          try {
            var reg = await navigator.serviceWorker.getRegistration('/sw.js');
            if (!reg) {
              setStatus(false, t('push.statusInactive'), t('push.statusInactiveDetail'));
              return;
            }
            var sub = await reg.pushManager.getSubscription();
            if (sub) {
              setStatus(true, t('push.statusActive'), t('push.statusActiveDetail'));
            } else {
              setStatus(false, t('push.statusInactive'), t('push.statusInactiveDetail'));
            }
          } catch (err) {
            console.warn('[pwa-push] check failed', err);
            setStatus(false, t('push.statusError'), err.message || String(err));
          }
        }

        // PIN enrollment: verify PIN → subscribe push
        btnEnroll.addEventListener('click', async function () {
          var pin = (pinInput.value || '').replace(/\D/g, '').trim();
          if (pin.length !== 6) {
            pinError.textContent = t('push.pinInvalid');
            pinError.style.display = 'block';
            pinInput.focus();
            return;
          }
          pinError.style.display = 'none';
          btnEnroll.disabled = true;
          btnEnroll.textContent = t('common.loading');

          try {
            // 1. Request notification permission
            var permission = await Notification.requestPermission();
            if (permission !== 'granted') {
              throw { code: 'PERMISSION_DENIED', message: t('push.permissionDenied') };
            }

            // 2. Register SW + subscribe push
            var reg = await navigator.serviceWorker.getRegistration('/sw.js');
            if (!reg) {
              reg = await navigator.serviceWorker.register('/sw.js');
              await navigator.serviceWorker.ready;
            }
            var sub = await reg.pushManager.subscribe({
              userVisibleOnly: true,
              applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
            });
            var subJSON = sub.toJSON();

            // 3. Verify PIN + register subscription on backend
            var res = await fetch('/d1/push/pin/verify', {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify({
                pin: pin,
                subscription: subJSON,
                userAgent: navigator.userAgent
              })
            });
            var data = await res.json();
            if (!res.ok) {
              // If PIN invalid, unsubscribe the push we just created
              try { await sub.unsubscribe(); } catch {}
              throw new Error(data.message || data.error || 'Verification failed');
            }

            showToast(t('push.enabledToast'));
            pinInput.value = '';
            checkStatus();
          } catch (err) {
            console.error('[pwa-push] enroll failed', err);
            pinError.textContent = err.message || t('push.pinVerifyFailed');
            pinError.style.display = 'block';
          } finally {
            btnEnroll.disabled = false;
            btnEnroll.textContent = t('push.pinEnrollBtn');
          }
        });

        // PIN digit boxes logic
        var pinBoxes = document.querySelectorAll('.pin-box');
        function syncPinValue() {
          var val = '';
          pinBoxes.forEach(function(b) { val += (b.value || ''); });
          pinInput.value = val;
        }
        pinBoxes.forEach(function(box, i) {
          box.addEventListener('input', function(e) {
            var v = box.value.replace(/\D/g, '');
            box.value = v.charAt(0) || '';
            box.classList.toggle('filled', !!box.value);
            syncPinValue();
            if (box.value && i < 5) pinBoxes[i + 1].focus();
            // If pasted multiple digits, fill remaining boxes
            if (v.length > 1) {
              var chars = v.split('');
              for (var j = 0; j < chars.length && (i + j) < 6; j++) {
                pinBoxes[i + j].value = chars[j];
                pinBoxes[i + j].classList.add('filled');
              }
              var nextIdx = Math.min(i + chars.length, 5);
              pinBoxes[nextIdx].focus();
              syncPinValue();
            }
          });
          box.addEventListener('keydown', function(e) {
            if (e.key === 'Backspace' && !box.value && i > 0) {
              pinBoxes[i - 1].value = '';
              pinBoxes[i - 1].classList.remove('filled');
              pinBoxes[i - 1].focus();
              syncPinValue();
            }
            if (e.key === 'Enter') { e.preventDefault(); btnEnroll.click(); }
          });
          box.addEventListener('focus', function() { box.select(); });
          // Handle paste on any box
          box.addEventListener('paste', function(e) {
            e.preventDefault();
            var paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
            for (var j = 0; j < 6; j++) {
              pinBoxes[j].value = paste.charAt(j) || '';
              pinBoxes[j].classList.toggle('filled', !!pinBoxes[j].value);
            }
            var focusIdx = Math.min(paste.length, 5);
            pinBoxes[focusIdx].focus();
            syncPinValue();
          });
        });

        // Disable push
        btnDisable.addEventListener('click', async function () {
          if (!confirm(t('push.disableConfirm'))) return;
          btnDisable.disabled = true;
          btnDisable.textContent = t('common.loading');
          try {
            var reg = await navigator.serviceWorker.getRegistration('/sw.js');
            if (reg) {
              var sub = await reg.pushManager.getSubscription();
              if (sub) {
                var endpoint = sub.endpoint;
                await sub.unsubscribe();
                try {
                  await fetch('/d1/push/unsubscribe', {
                    method: 'POST',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify({ endpoint: endpoint })
                  });
                } catch (e) { console.warn('[pwa-push] backend unsubscribe failed', e); }
              }
            }
            showToast(t('push.disabledToast'));
          } catch (err) {
            console.error('[pwa-push] disable failed', err);
            showToast(t('push.disableError'));
          } finally {
            btnDisable.disabled = false;
            btnDisable.textContent = t('push.disableBtn');
            checkStatus();
          }
        });

        checkStatus();
      })();
    </script>
  </body>
</html>
