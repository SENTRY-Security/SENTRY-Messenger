# ── Production (default) ─────────────────────────────────────────
name = "message-data"
main = "src/worker.js"
compatibility_date = "2025-09-17"
compatibility_flags = ["nodejs_compat"]

[vars]
# Comma-separated origins allowed for CORS (empty = allow all)
# CORS_ORIGINS = "https://app.example.com,https://www.example.com"
# Node.js WS server URL for real-time notifications (Phase 1 bridge)
# WS_NOTIFY_URL = "https://ws.example.com/ws/notify"
# WS_NOTIFY_SECRET → set via `wrangler secret put WS_NOTIFY_SECRET`
# Node.js origin for proxying unmigrated routes (empty = return 404)
# NODEJS_ORIGIN = "https://nodejs-api.message.sentry.red"

[[d1_databases]]
binding = "DB"
database_name = "message_db"
database_id = "99728586-d8a9-4525-a1af-e68e84594047"

# ── UAT Environment ─────────────────────────────────────────────
[env.uat]
name = "message-data-uat"

[[env.uat.d1_databases]]
binding = "DB"
database_name = "message_db_uat"
database_id = "362f2681-29fc-45bf-9e2a-09b9021e6019"
