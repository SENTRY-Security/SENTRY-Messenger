name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write        # OIDC token for SLSA provenance + attestation
  attestations: write     # GitHub artifact attestation

jobs:
  # ── Detect which projects have changes ──────────────────────────────
  changes:
    runs-on: ubuntu-latest
    name: Detect Changes
    outputs:
      worker: ${{ steps.detect.outputs.worker }}
      web: ${{ steps.detect.outputs.web }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: detect
        run: |
          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"
          # If base is null (first push or force-push), compare against HEAD~1
          if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          fi
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          echo "worker=false" >> "$GITHUB_OUTPUT"
          echo "web=false" >> "$GITHUB_OUTPUT"
          if echo "$CHANGED" | grep -q '^data-worker/'; then
            echo "worker=true" >> "$GITHUB_OUTPUT"
            echo "→ Worker changes detected"
          fi
          if echo "$CHANGED" | grep -q '^web/'; then
            echo "web=true" >> "$GITHUB_OUTPUT"
            echo "→ Web changes detected"
          fi
  # ── Data Worker (Cloudflare Worker) ─────────────────────────────────
  deploy-worker:
    runs-on: ubuntu-latest
    name: Deploy Data Worker
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Worker Dependencies
        working-directory: data-worker
        run: npm ci

      - name: Check Wrangler Authentication
        run: npx wrangler@4 whoami
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 Migrations
        working-directory: data-worker
        run: |
          echo "Applying D1 migrations..."
          npx wrangler@4 d1 migrations apply message_db --remote || echo "No pending migrations or error applying migrations"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CI: true

      - name: Deploy Worker
        working-directory: data-worker
        run: |
          echo "Deploying Cloudflare Worker..."
          npx wrangler@4 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CI: true

      - name: Set Worker Secrets
        working-directory: data-worker
        run: |
          echo "Setting Worker secrets..."
          printf '%s' "$SECRET_OPAQUE_OPRF_SEED"    | npx wrangler@4 secret put OPAQUE_OPRF_SEED 2>&1 || true
          printf '%s' "$SECRET_OPAQUE_AKE_PRIV_B64" | npx wrangler@4 secret put OPAQUE_AKE_PRIV_B64 2>&1 || true
          printf '%s' "$SECRET_OPAQUE_AKE_PUB_B64"  | npx wrangler@4 secret put OPAQUE_AKE_PUB_B64 2>&1 || true
          printf '%s' "$SECRET_NTAG424_KM"           | npx wrangler@4 secret put NTAG424_KM 2>&1 || true
          printf '%s' "$SECRET_DATA_API_HMAC"        | npx wrangler@4 secret put DATA_API_HMAC 2>&1 || true
          printf '%s' "$SECRET_ACCOUNT_HMAC_KEY"     | npx wrangler@4 secret put ACCOUNT_HMAC_KEY 2>&1 || true
          printf '%s' "$SECRET_INVITE_TOKEN_KEY"     | npx wrangler@4 secret put INVITE_TOKEN_KEY 2>&1 || true
          printf '%s' "$SECRET_PORTAL_HMAC_SECRET"   | npx wrangler@4 secret put PORTAL_HMAC_SECRET 2>&1 || true
          printf '%s' "$SECRET_S3_ACCESS_KEY"        | npx wrangler@4 secret put S3_ACCESS_KEY 2>&1 || true
          printf '%s' "$SECRET_S3_SECRET_KEY"        | npx wrangler@4 secret put S3_SECRET_KEY 2>&1 || true
          printf '%s' "$SECRET_WS_TOKEN_SECRET"      | npx wrangler@4 secret put WS_TOKEN_SECRET 2>&1 || true
          echo "Worker secrets set."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SECRET_OPAQUE_OPRF_SEED: ${{ secrets.OPAQUE_OPRF_SEED }}
          SECRET_OPAQUE_AKE_PRIV_B64: ${{ secrets.OPAQUE_AKE_PRIV_B64 }}
          SECRET_OPAQUE_AKE_PUB_B64: ${{ secrets.OPAQUE_AKE_PUB_B64 }}
          SECRET_NTAG424_KM: ${{ secrets.NTAG424_KM }}
          SECRET_DATA_API_HMAC: ${{ secrets.DATA_API_HMAC }}
          SECRET_ACCOUNT_HMAC_KEY: ${{ secrets.ACCOUNT_HMAC_KEY }}
          SECRET_INVITE_TOKEN_KEY: ${{ secrets.INVITE_TOKEN_KEY }}
          SECRET_PORTAL_HMAC_SECRET: ${{ secrets.PORTAL_HMAC_SECRET }}
          SECRET_S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          SECRET_S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          SECRET_WS_TOKEN_SECRET: ${{ secrets.WS_TOKEN_SECRET }}
          CI: true

  # ── Web (Cloudflare Pages) ────────────────────────────────────────────
  deploy-pages:
    runs-on: ubuntu-latest
    name: Deploy Web Pages
    needs: changes
    if: needs.changes.outputs.web == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Web Dependencies
        working-directory: web
        run: npm ci

      - name: Build Web
        working-directory: web
        run: |
          echo "Starting web build..."
          npm run build
        env:
          CI: true
          SENTRY_ENV: production

      # Functions MUST be copied BEFORE tarring/signing so the signed
      # artifact is identical to what gets deployed (audit finding #1).
      - name: Copy Functions to Dist
        working-directory: web
        run: |
          if [ -d "functions" ]; then
            echo "Copying functions to dist/functions..."
            mkdir -p dist/functions
            cp -r functions/* dist/functions/
          else
            echo "Functions directory not found, skipping copy."
          fi

      - name: Verify Build Integrity
        working-directory: web
        run: |
          echo "Verifying build manifest..."
          npm run verify
          echo "Build hash: $(cat dist/.well-known/sentry-build.json | node -e "process.stdin.resume(); let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>console.log(JSON.parse(d).hashes.aggregate.slice(0,16)+'...'))")"

      - name: Generate Build Artifact
        working-directory: web
        run: |
          tar -czf ../web-dist.tar.gz -C dist .
          echo "web-dist.tar.gz created ($(du -h ../web-dist.tar.gz | cut -f1))"

      - name: Compute Artifact Digest
        id: digest
        run: |
          HASH=$(sha256sum web-dist.tar.gz | awk '{print $1}')
          SUBJECT=$(echo -n "$HASH  web-dist.tar.gz" | base64 -w0)
          echo "digest=$SUBJECT" >> "$GITHUB_OUTPUT"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web-dist.tar.gz
          retention-days: 90

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: web-dist.tar.gz
          subject-name: sentry-messenger-web

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Artifact (keyless)
        run: cosign sign-blob --yes web-dist.tar.gz --bundle web-dist.cosign.bundle

      - name: Upload Cosign Bundle
        uses: actions/upload-artifact@v4
        with:
          name: cosign-bundle
          path: web-dist.cosign.bundle
          retention-days: 90

      - name: Deploy to Cloudflare Pages
        working-directory: web
        run: |
          echo "Deploying to Cloudflare Pages (Project: message-web-hybrid)..."
          npx wrangler@4 pages deploy ./dist \
            --project-name message-web-hybrid \
            --branch=main \
            --commit-dirty=true \
            --commit-message="${{ github.sha }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CI: true

    outputs:
      digest: ${{ steps.digest.outputs.digest }}

  # ── SLSA Provenance (Level 2) ───────────────────────────────────────
  slsa-provenance:
    needs: [changes, deploy-pages]
    if: needs.changes.outputs.web == 'true'
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.deploy-pages.outputs.digest }}"
      upload-assets: true
