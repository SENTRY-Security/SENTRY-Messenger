name: Deploy to UAT

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'What to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'worker'
          - 'web'
      set_secrets:
        description: 'Also set worker secrets'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  # ── Detect which projects have changes ──────────────────────────────
  changes:
    runs-on: ubuntu-latest
    name: Detect Changes
    outputs:
      worker: ${{ steps.detect.outputs.worker }}
      web: ${{ steps.detect.outputs.web }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: detect
        run: |
          # For manual triggers, use the deploy_target input directly
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ github.event.inputs.deploy_target }}"
            echo "Manual trigger: deploy_target=$TARGET"
            if [ "$TARGET" = "all" ] || [ "$TARGET" = "worker" ]; then
              echo "worker=true" >> "$GITHUB_OUTPUT"
              echo "→ Worker selected"
            else
              echo "worker=false" >> "$GITHUB_OUTPUT"
            fi
            if [ "$TARGET" = "all" ] || [ "$TARGET" = "web" ]; then
              echo "web=true" >> "$GITHUB_OUTPUT"
              echo "→ Web selected"
            else
              echo "web=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          # For push events, detect changes via git diff
          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"
          if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          fi
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          echo "worker=false" >> "$GITHUB_OUTPUT"
          echo "web=false" >> "$GITHUB_OUTPUT"
          if echo "$CHANGED" | grep -q '^data-worker/'; then
            echo "worker=true" >> "$GITHUB_OUTPUT"
            echo "→ Worker changes detected"
          fi
          if echo "$CHANGED" | grep -q '^web/'; then
            echo "web=true" >> "$GITHUB_OUTPUT"
            echo "→ Web changes detected"
          fi
  # ── Data Worker (Cloudflare Worker — UAT) ──────────────────────────
  deploy-worker:
    runs-on: ubuntu-latest
    name: Deploy Data Worker (UAT)
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Worker Dependencies
        working-directory: data-worker
        run: npm ci

      - name: Check Wrangler Authentication
        run: npx wrangler@4 whoami
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.UAT_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_EMAIL: ${{ secrets.UAT_CLOUDFLARE_EMAIL }}
          CLOUDFLARE_API_KEY: ${{ secrets.UAT_CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.UAT_CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 Migrations (UAT)
        working-directory: data-worker
        run: |
          echo "Applying D1 migrations to UAT database..."
          npx wrangler@4 d1 migrations apply message_db_uat --remote --env uat || echo "No pending migrations or error applying migrations"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.UAT_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_EMAIL: ${{ secrets.UAT_CLOUDFLARE_EMAIL }}
          CLOUDFLARE_API_KEY: ${{ secrets.UAT_CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.UAT_CLOUDFLARE_ACCOUNT_ID }}
          CI: true

      - name: Deploy Worker (UAT)
        working-directory: data-worker
        run: |
          echo "Deploying Cloudflare Worker (UAT)..."
          npx wrangler@4 deploy --env uat
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.UAT_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_EMAIL: ${{ secrets.UAT_CLOUDFLARE_EMAIL }}
          CLOUDFLARE_API_KEY: ${{ secrets.UAT_CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.UAT_CLOUDFLARE_ACCOUNT_ID }}
          CI: true

      - name: Set Worker Secrets (UAT)
        if: github.event.inputs.set_secrets == 'true'
        working-directory: data-worker
        run: |
          echo "Setting Worker secrets (UAT)..."
          printf '%s' "$SECRET_OPAQUE_OPRF_SEED"    | npx wrangler@4 secret put OPAQUE_OPRF_SEED --env uat 2>&1 || true
          printf '%s' "$SECRET_OPAQUE_AKE_PRIV_B64" | npx wrangler@4 secret put OPAQUE_AKE_PRIV_B64 --env uat 2>&1 || true
          printf '%s' "$SECRET_OPAQUE_AKE_PUB_B64"  | npx wrangler@4 secret put OPAQUE_AKE_PUB_B64 --env uat 2>&1 || true
          printf '%s' "$SECRET_NTAG424_KM"           | npx wrangler@4 secret put NTAG424_KM --env uat 2>&1 || true
          printf '%s' "$SECRET_DATA_API_HMAC"        | npx wrangler@4 secret put DATA_API_HMAC --env uat 2>&1 || true
          printf '%s' "$SECRET_ACCOUNT_HMAC_KEY"     | npx wrangler@4 secret put ACCOUNT_HMAC_KEY --env uat 2>&1 || true
          printf '%s' "$SECRET_INVITE_TOKEN_KEY"     | npx wrangler@4 secret put INVITE_TOKEN_KEY --env uat 2>&1 || true
          printf '%s' "$SECRET_PORTAL_HMAC_SECRET"   | npx wrangler@4 secret put PORTAL_HMAC_SECRET --env uat 2>&1 || true
          printf '%s' "$SECRET_S3_ACCESS_KEY"        | npx wrangler@4 secret put S3_ACCESS_KEY --env uat 2>&1 || true
          printf '%s' "$SECRET_S3_SECRET_KEY"        | npx wrangler@4 secret put S3_SECRET_KEY --env uat 2>&1 || true
          printf '%s' "$SECRET_WS_TOKEN_SECRET"      | npx wrangler@4 secret put WS_TOKEN_SECRET --env uat 2>&1 || true
          echo "Worker secrets set."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.UAT_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.UAT_CLOUDFLARE_ACCOUNT_ID }}
          SECRET_OPAQUE_OPRF_SEED: ${{ secrets.UAT_OPAQUE_OPRF_SEED }}
          SECRET_OPAQUE_AKE_PRIV_B64: ${{ secrets.UAT_OPAQUE_AKE_PRIV_B64 }}
          SECRET_OPAQUE_AKE_PUB_B64: ${{ secrets.UAT_OPAQUE_AKE_PUB_B64 }}
          SECRET_NTAG424_KM: ${{ secrets.UAT_NTAG424_KM }}
          SECRET_DATA_API_HMAC: ${{ secrets.UAT_DATA_API_HMAC }}
          SECRET_ACCOUNT_HMAC_KEY: ${{ secrets.UAT_ACCOUNT_HMAC_KEY }}
          SECRET_INVITE_TOKEN_KEY: ${{ secrets.UAT_INVITE_TOKEN_KEY }}
          SECRET_PORTAL_HMAC_SECRET: ${{ secrets.UAT_PORTAL_HMAC_SECRET }}
          SECRET_S3_ACCESS_KEY: ${{ secrets.UAT_S3_ACCESS_KEY }}
          SECRET_S3_SECRET_KEY: ${{ secrets.UAT_S3_SECRET_KEY }}
          SECRET_WS_TOKEN_SECRET: ${{ secrets.UAT_WS_TOKEN_SECRET }}
          CI: true

  # ── Web (Cloudflare Pages — UAT Preview) ───────────────────────────
  deploy-pages:
    runs-on: ubuntu-latest
    name: Deploy Web Pages (UAT)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Web Dependencies
        working-directory: web
        run: npm ci

      - name: Build Web
        working-directory: web
        run: |
          echo "Starting web build..."
          npm run build
        env:
          CI: true

      - name: Copy Functions to Dist
        working-directory: web
        run: |
          if [ -d "functions" ]; then
            echo "Copying functions to dist/functions..."
            mkdir -p dist/functions
            cp -r functions/* dist/functions/
          else
            echo "Functions directory not found, skipping copy."
          fi

      - name: Deploy to Cloudflare Pages (UAT)
        working-directory: web
        run: |
          echo "Deploying to Cloudflare Pages (UAT project: message-web-hybrid-uat)..."
          npx wrangler@4 pages deploy ./dist \
            --project-name message-web-hybrid-uat \
            --branch=main \
            --commit-dirty=true \
            --commit-message="UAT Deploy $(date) [${{ github.ref_name }}]"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.UAT_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_EMAIL: ${{ secrets.UAT_CLOUDFLARE_EMAIL }}
          CLOUDFLARE_API_KEY: ${{ secrets.UAT_CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.UAT_CLOUDFLARE_ACCOUNT_ID }}
          CI: true
